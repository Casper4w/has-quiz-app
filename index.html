<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業 AI 轉型實踐工具包：HAS 與 PTCF 實戰沙盒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-sans">
    
    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-black text-gray-900 mb-3">企業 AI 轉型實踐工具包</h1>
        <p class="text-lg text-gray-600">從人機協作思維到跨部門提示詞實戰沙盒</p>
    </header>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6">
        <nav class="w-full md:w-1/4 lg:w-1/5 flex-shrink-0">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 flex md:flex-col gap-2 overflow-x-auto no-scrollbar sticky top-8">
                <button id="nav-has" onclick="switchMenu('has')" class="nav-btn w-full px-5 py-4 bg-indigo-600 text-white rounded-xl font-bold text-left transition-colors">HAS 協作五等級</button>
                <button id="nav-ptcf" onclick="switchMenu('ptcf')" class="nav-btn w-full px-5 py-4 bg-transparent text-gray-600 hover:bg-gray-50 rounded-xl font-bold text-left transition-colors">PTCF 提示詞框架</button>
            </div>
        </nav>

        <main class="w-full md:w-3/4 lg:w-4/5">
            <div id="section-has" class="animate-fade-in">
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-200 mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">HAS 人類自主性量表 (Human Agency Scale)</h2>
                    <p class="text-gray-600 mb-6">理解人機協作的五個層次，定位你的 AI 應用深度。</p>
                    <div class="overflow-x-auto shadow-sm rounded-lg border border-gray-400 bg-white text-left">
                        <table class="w-full border-collapse min-w-[900px]">
                            <thead>
                                <tr>
                                    <th class="p-4 border-b border-r border-gray-400 font-bold text-center">指標</th>
                                    <th class="p-4 border-b border-r border-gray-400 font-bold text-center">HAS H1</th>
                                    <th class="p-4 border-b border-r border-gray-400 font-bold text-center">HAS H2</th>
                                    <th class="p-4 border-b border-r border-gray-400 font-bold text-center">HAS H3</th>
                                    <th class="p-4 border-b border-r border-gray-400 font-bold text-center">HAS H4</th>
                                    <th class="p-4 border-b border-gray-400 font-bold text-center">HAS H5</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="section-ptcf" class="hidden space-y-8 animate-fade-in">
                <div class="bg-indigo-900 text-white p-8 rounded-3xl shadow-xl space-y-6">
                    <h3 class="text-2xl font-black">PTCF 同仁實戰演練沙盒 (動態模擬模式)</h3>
                    <p class="text-indigo-200 text-sm">同仁可在下方動態調整或自訂架構，體驗結構化提示詞。</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <textarea id="input-p" rows="2" class="w-full p-3 bg-indigo-950 border border-indigo-700 rounded-xl text-white text-sm"></textarea>
                        <textarea id="input-t" rows="2" class="w-full p-3 bg-indigo-950 border border-indigo-700 rounded-xl text-white text-sm"></textarea>
                        <textarea id="input-c" rows="3" class="w-full p-3 bg-indigo-950 border border-indigo-700 rounded-xl text-white text-sm"></textarea>
                        <textarea id="input-f" rows="3" class="w-full p-3 bg-indigo-950 border border-indigo-700 rounded-xl text-white text-sm"></textarea>
                    </div>
                    <button onclick="triggerSandboxAI()" class="px-8 py-4 bg-emerald-500 rounded-xl font-black text-lg mx-auto block hover:bg-emerald-600 transition">
                        🚀 提示詞發送
                    </button>
                    <div id="ai-output-box" class="hidden bg-white text-gray-800 rounded-2xl p-6">
                        <div id="ai-output-content" class="text-sm leading-relaxed"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 切換顯示邏輯
        function switchMenu(s) {
            document.getElementById('section-has').classList.toggle('hidden', s !== 'has');
            document.getElementById('section-ptcf').classList.toggle('hidden', s !== 'ptcf');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('bg-indigo-600', btn.id === 'nav-'+s));
        }

        // 模擬回應資料庫 (中和廠區版本)
        const responses = {
            jd: [ "<h3>【AI 產出：自動化設備維護技術員 工作說明書】</h3><br>負責中和廠區自動化線體操作與日常點檢，維持稼動率95%以上。", ... ],
            report: [ "<h3>【AI 產出：3號產線停機檢討報告】</h3><br>原因：風扇軸承積碳。對策：每週保養。", ... ],
            email: [ "<h3>【AI 產出：供應商催貨信】</h3><br>主旨：關於訂單交期延誤之補救要求，請於本週五前安排空運。", ... ]
        };

        // 發送邏輯
        function triggerSandboxAI() {
            const outBox = document.getElementById('ai-output-box');
            const outContent = document.getElementById('ai-output-content');
            outBox.classList.remove('hidden');
            outContent.innerHTML = "正在調用 Gemini AI 引擎分析中... (7秒後產出)";
            
            setTimeout(() => {
                const list = responses[currentActiveSandboxTopic];
                outContent.innerHTML = list[Math.floor(Math.random() * list.length)];
            }, 7000); 
        }
    </script>
</body>
</html>
